<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient for the "Log" background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradBeam" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1c40f;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#f1c40f;stop-opacity:0.0" />
    </linearGradient>
  </defs>

  <!-- Stylized Log File Background -->
  <rect x="20" y="10" width="60" height="80" rx="5" fill="url(#grad1)" stroke="#ecf0f1" stroke-width="2" />

  <!-- Log lines -->
  <line x1="30" y1="25" x2="70" y2="25" stroke="#ecf0f1" stroke-width="3" stroke-linecap="round" />
  <line x1="30" y1="35" x2="60" y2="35" stroke="#ecf0f1" stroke-width="3" stroke-linecap="round" />
  <line x1="30" y1="45" x2="70" y2="45" stroke="#ecf0f1" stroke-width="3" stroke-linecap="round" />
  <line x1="30" y1="55" x2="50" y2="55" stroke="#ecf0f1" stroke-width="3" stroke-linecap="round" />
  <line x1="30" y1="65" x2="70" y2="65" stroke="#ecf0f1" stroke-width="3" stroke-linecap="round" />
  <line x1="30" y1="75" x2="60" y2="75" stroke="#ecf0f1" stroke-width="3" stroke-linecap="round" />

  <!-- "Lumine" Light Beam -->
  <path d="M 10,10 L 90,90 L 60,90 L 10,40 Z" fill="url(#gradBeam)" />

  <!-- Flashlight / Magnifying Glass Handle -->
  <rect x="5" y="5" width="20" height="10" rx="2" fill="#7f8c8d" transform="rotate(45 15 10)" />
  <circle cx="15" cy="15" r="8" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="2" />
  <circle cx="15" cy="15" r="5" fill="#f1c40f" />

  <!-- Text "L" for LumineLog -->
  <text x="50" y="55" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#f1c40f" text-anchor="middle" opacity="0.3">L</text>
</svg>
